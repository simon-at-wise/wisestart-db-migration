spring:
  application:
    name: wisestart-db-migration

  datasource:
    url: jdbc:mariadb://localhost:3316/leaderboard
    username: leaderboard_user
    password: leaderboard_pass
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: leaderboard
      connection-timeout: 30000
      validation-timeout: 5000
      data-source-properties:
        queryTimeout: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:mariadb://localhost:3316/leaderboard
    user: leaderboard_user
    password: leaderboard_pass

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
